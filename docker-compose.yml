version: '3.5'

services:

  etcd:
    container_name: siip-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: siip-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: siip-milvus
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  postgres:
    container_name: siip-postgres
    image: postgres:15
    environment:
      POSTGRES_DB: siip
      POSTGRES_USER: siip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siip_local}
    ports:
      - "5433:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siip"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    container_name: siip-neo4j
    image: neo4j:5.15-community
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-siip_local_neo4j}"
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j:/data

  backend:
    container_name: siip-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Override environment variables to connect to Docker network hosts instead of localhost
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - NEO4J_URI=bolt://neo4j:7687
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy

volumes:
  etcd:
  minio:
  milvus:
  postgres:
  neo4j:

networks:
  default:
    name: siip_net
