name: Deploy to Fly.io

# Every push to main redeploys production (API + UI + SciNCL image).
# Code/style changes go live automatically. Cloud databases (Supabase, Aura)
# are unchanged — data only shifts when you upload on the live site or run
# maintenance scripts against the shared cloud DBs.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-fly
  cancel-in-progress: false

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only --wait-timeout 600

      - name: Smoke-test /health
        run: |
          set -e
          APP_URL="https://siip-armchair-akhil.fly.dev"
          for i in {1..18}; do
            if curl -sf "$APP_URL/health" >/dev/null; then
              echo "✓ Production healthy at $APP_URL"
              exit 0
            fi
            echo "Waiting for health… ($i/18)"
            sleep 10
          done
          echo "✗ /health never returned 200" >&2
          exit 1
