# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Keeps databases off the public internet. App is on port 8080.

services:
  etcd:
    restart: unless-stopped

  minio:
    ports: !reset []
    restart: unless-stopped

  milvus:
    ports: !reset []
    restart: unless-stopped

  postgres:
    ports: !reset []
    restart: unless-stopped

  neo4j:
    ports: !reset []
    restart: unless-stopped

  backend:
    ports:
      - "8080:8080"
    restart: unless-stopped
